services:
  engine:
    build: engine/
    image: chorus-engine:latest
    container_name: chorus-engine
    hostname: chorus-engine

  server:
    build: server/
    container_name: chorus-server
    hostname: chorus-server
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/chorus
      - SECRET_KEY=your_secret_key
    depends_on:
      db:
        condition: service_healthy
        restart: true
      engine:
        condition: service_started
    ports:
      - "8000:8000"

  db:
    image: postgres:latest
    container_name: chorus-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chorus
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: chorus-frontend
    hostname: chorus-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules                # Prevent host node_modules override
    stdin_open: true
    tty: true
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
